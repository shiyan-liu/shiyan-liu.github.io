<style>
/* Back to top button */
#back-to-top {
  position: fixed;
  bottom: 2em;
  right: 2em;
  width: 36px;
  height: 36px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #7a8288;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, border-color 0.15s, color 0.15s;
  z-index: 999;
}
#back-to-top.visible {
  opacity: 1;
  pointer-events: auto;
}
#back-to-top:hover {
  border-color: #aaa;
  color: #333;
}
</style>
